name: Build and Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          TURNSTILE_SITE_KEY: '0x4AAAAAACxasQskYMJsn7bk'

      - name: Verify build artifacts
        run: node scripts/verify-build.mjs

      - name: Deploy to Cloudflare Workers
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy smoke test
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          sleep 5
          failed=0
          for path in / /expertise /consultancy /work-experience /education /contact /privacy; do
            url="https://www.henriksoderlund.com${path}"
            tmpfile=$(mktemp)
            status=$(curl -s --compressed -o "$tmpfile" -w "%{http_code}" --max-time 15 "$url")
            size=$(wc -c < "$tmpfile")
            rm -f "$tmpfile"

            if [ "$status" -ne 200 ]; then
              echo "::error::FAIL: $url (HTTP $status)"
              failed=1
            elif [ "$size" -lt 1000 ]; then
              echo "::error::FAIL: $url (HTTP $status but only $size bytes - page is empty)"
              failed=1
            else
              echo "OK: $url ($status, $size bytes)"
            fi
          done

          echo "=== Checking API endpoints ==="
          for path in /health /llms.txt; do
            url="https://www.henriksoderlund.com${path}"
            tmpfile=$(mktemp)
            status=$(curl -s --compressed -o "$tmpfile" -w "%{http_code}" --max-time 10 "$url")
            size=$(wc -c < "$tmpfile")
            rm -f "$tmpfile"

            if [ "$status" -ne 200 ]; then
              echo "::error::FAIL: $url (HTTP $status)"
              failed=1
            elif [ "$size" -eq 0 ]; then
              echo "::error::FAIL: $url (HTTP $status but empty body)"
              failed=1
            else
              echo "OK: $url ($status, $size bytes)"
            fi
          done
          [ "$failed" -eq 0 ] || exit 1

      - name: Deployment Summary
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## Deployment Successful

          | Page | URL |
          |------|-----|
          | Homepage | https://www.henriksoderlund.com/ |
          | Expertise | https://www.henriksoderlund.com/expertise |
          | Consultancy | https://www.henriksoderlund.com/consultancy |
          | Work Experience | https://www.henriksoderlund.com/work-experience |
          | Education | https://www.henriksoderlund.com/education |
          | Contact | https://www.henriksoderlund.com/contact |
          EOF
