name: Build and Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Verify build artifacts
        run: |
          echo "Checking build output..."
          ls -la dist/client/ 2>/dev/null || ls -la dist/

          echo "Verifying critical files..."
          for file in "expertise.md" "work-experience.md" "education.md" "consultancy.md" "index.html.md"; do
            found=$(find dist -name "$file" -type f 2>/dev/null | head -1)
            if [ -z "$found" ]; then
              echo "Warning: $file not found in build output"
            else
              echo "Found: $found ($(wc -c < "$found") bytes)"
            fi
          done

          echo "All critical checks complete"

      - name: Deploy to Cloudflare Workers
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment Summary
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "## Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Available URLs" >> $GITHUB_STEP_SUMMARY
          echo "- [Homepage](https://www.henriksoderlund.com/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Expertise](https://www.henriksoderlund.com/expertise)" >> $GITHUB_STEP_SUMMARY
          echo "- [Consultancy](https://www.henriksoderlund.com/consultancy)" >> $GITHUB_STEP_SUMMARY
          echo "- [Work Experience](https://www.henriksoderlund.com/work-experience)" >> $GITHUB_STEP_SUMMARY
          echo "- [Education](https://www.henriksoderlund.com/education)" >> $GITHUB_STEP_SUMMARY
