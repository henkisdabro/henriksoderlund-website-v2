name: Build and Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          TURNSTILE_SITE_KEY: '0x4AAAAAACxasQskYMJsn7bk'
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

      - name: Verify build artifacts
        run: |
          failed=0
          for file in expertise.md work-experience.md education.md consultancy.md contact.md index.html.md llms.txt llms-full.txt; do
            found=$(find dist -name "$file" -type f 2>/dev/null | head -1)
            if [ -z "$found" ]; then
              echo "::error::$file not found in build output"
              failed=1
            else
              echo "OK: $found ($(wc -c < "$found") bytes)"
            fi
          done
          [ "$failed" -eq 0 ] || exit 1

      - name: Deploy to Cloudflare Workers
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy smoke test
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          failed=0
          for path in / /expertise /consultancy /work-experience /education /contact; do
            url="https://www.henriksoderlund.com${path}"
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url")
            [ "$status" -eq 200 ] && echo "OK: $url" || { echo "::error::FAIL: $url ($status)"; failed=1; }
          done
          [ "$failed" -eq 0 ] || exit 1

      - name: Deployment Summary
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## Deployment Successful

          | Page | URL |
          |------|-----|
          | Homepage | https://www.henriksoderlund.com/ |
          | Expertise | https://www.henriksoderlund.com/expertise |
          | Consultancy | https://www.henriksoderlund.com/consultancy |
          | Work Experience | https://www.henriksoderlund.com/work-experience |
          | Education | https://www.henriksoderlund.com/education |
          | Contact | https://www.henriksoderlund.com/contact |
          EOF
