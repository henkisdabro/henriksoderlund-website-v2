name: Build and Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Verify build artifacts
        run: |
          echo "Checking build output..."
          ls -la dist/client/ 2>/dev/null || ls -la dist/

          echo "Verifying critical files..."
          failed=0
          for file in "expertise.md" "work-experience.md" "education.md" "consultancy.md" "contact.md" "index.html.md" "llms.txt" "llms-full.txt"; do
            found=$(find dist -name "$file" -type f 2>/dev/null | head -1)
            if [ -z "$found" ]; then
              echo "ERROR: $file not found in build output"
              failed=1
            else
              echo "Found: $found ($(wc -c < "$found") bytes)"
            fi
          done

          if [ "$failed" -eq 1 ]; then
            echo "Build artifact verification failed"
            exit 1
          fi

          echo "All critical checks passed"

      - name: Deploy to Cloudflare Workers
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: ''

      - name: Post-deploy smoke test
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "Running post-deploy smoke tests..."
          failed=0
          for path in "/" "/expertise" "/consultancy" "/work-experience" "/education" "/contact"; do
            url="https://www.henriksoderlund.com${path}"
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url")
            if [ "$status" -eq 200 ]; then
              echo "OK: $url ($status)"
            else
              echo "FAIL: $url (HTTP $status)"
              failed=1
            fi
          done

          if [ "$failed" -eq 1 ]; then
            echo "Smoke test failed - some pages returned non-200 status"
            exit 1
          fi

          echo "All smoke tests passed"

      - name: Deployment Summary
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "## Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Available URLs" >> $GITHUB_STEP_SUMMARY
          echo "- [Homepage](https://www.henriksoderlund.com/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Expertise](https://www.henriksoderlund.com/expertise)" >> $GITHUB_STEP_SUMMARY
          echo "- [Consultancy](https://www.henriksoderlund.com/consultancy)" >> $GITHUB_STEP_SUMMARY
          echo "- [Work Experience](https://www.henriksoderlund.com/work-experience)" >> $GITHUB_STEP_SUMMARY
          echo "- [Education](https://www.henriksoderlund.com/education)" >> $GITHUB_STEP_SUMMARY
          echo "- [Contact](https://www.henriksoderlund.com/contact)" >> $GITHUB_STEP_SUMMARY
